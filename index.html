            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .article-modal.show {
            display: flex;
        }

        .article-modal-content {
            background: white;
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        .close-article-modal {
            position: sticky;
            top: 0;
            float: right;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            color: #212529;
            transition: all 0.2s;
        }

        .close-article-modal:hover {
            color: #667eea;
        }

        .skeleton-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .skeleton-title {
            height: 24px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            width: 70%;
            margin-bottom: 12px;
        }

        .skeleton-meta {
            height: 16px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            width: 40%;
            margin-bottom: 12px;
        }

        .skeleton-text {
            height: 14px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f8f9fa;
        }

        ::-webkit-scrollbar-thumb {
            background: #dee2e6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #adb5bd;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 250px;
            }

            .chat-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .messages-area {
                padding: 16px;
            }

            .modal-content {
                width: 95%;
            }

            .article-modal-content {
                width: 95%;
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
                position: fixed;
                height: 100%;
                z-index: 200;
            }

            .main-chat {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🧠 Cognify</div>
            </div>
            <button class="new-chat-btn">
                <span>➕</span>
                <span>Новый чат</span>
            </button>
            <button class="news-tab-btn">
                <span>📰</span>
                <span>Новости AI</span>
            </button>
            <div class="history-list" id="history">
                <!-- Conversation history will be loaded here -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-title">Cognify AI Chat</div>
                <div class="language-selector">
                    <button class="lang-btn active">🇷🇺 Русский</button>
                    <button class="lang-btn">🇬🇧 English</button>
                </div>
                <div class="api-selector">
                    <button class="api-btn active">Groq</button>
                    <button class="api-btn">Cerebras</button>
                    <button class="api-btn">Cloudflare</button>
                    <button class="api-btn">Gemini</button>
                </div>
                <div class="stats-badge">
                    <span>⚡</span>
                    <span>Активно</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-menu">
                        <div class="user-menu-item">
                            <span class="menu-icon">👤</span>
                            <span class="menu-text">Профиль</span>
                        </div>
                        <div class="user-menu-item">
                            <span class="menu-icon">⚙️</span>
                            <span class="menu-text">Настройки</span>
                        </div>
                        <div class="user-menu-item">
                            <span class="menu-icon">❓</span>
                            <span class="menu-text">Справка</span>
                        </div>
                        <div class="user-menu-item logout-item">
                            <span class="menu-icon">🚪</span>
                            <span class="menu-text">Выход</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="messages">
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Привет! 👋 Я Cognify AI. Я помогу вам с любыми вопросами. Выберите модель AI и начните диалог.
                    </div>
                </div>
            </div>

            <!-- News Container -->
            <div class="news-container" id="newsContainer">
                <div class="news-header">
                    <h2>📰 Новости AI</h2>
                    <button class="news-action-btn">🔄 Обновить</button>
                </div>
                <div class="news-list" id="newsList">
                    <!-- News cards will be loaded here -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea id="messageInput" placeholder="Введите вашу команду или вопрос..."></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Article Modal -->
    <div class="article-modal" id="articleModal">
        <div class="article-modal-content" id="articleContent">
            <button class="close-article-modal" id="closeArticleModal">&times;</button>
            <!-- Article content will be loaded here -->
        </div>
    </div>

    <!-- Login Modal (if needed) -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Вход в Cognify AI</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Пароль">
            <button>Войти</button>
            <div class="modal-switch">
                Нет аккаунта? <strong>Зарегистрироваться</strong>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        // Basic functionality can be added here
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const messagesArea = document.getElementById('messages');
        const userAvatar = document.querySelector('.user-avatar');
        const userMenu = document.querySelector('.user-menu');

        // Send message on button click
        sendBtn.addEventListener('click', function() {
            const message = messageInput.value.trim();
            if (message) {
                addMessage('user', message);
                messageInput.value = '';
            }
        });

        // Send message on Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Add message to chat
        function addMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${sender === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${text}</div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Toggle user menu
        userAvatar.addEventListener('click', function() {
            userMenu.classList.toggle('show');
        });

        // Close user menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-info')) {
                userMenu.classList.remove('show');
            }
        });

        // Close article modal
        document.getElementById('closeArticleModal').addEventListener('click', function() {
            document.getElementById('articleModal').classList.remove('show');
        });
    </script>
</body>

</html>
