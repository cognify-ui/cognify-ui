name: 🤖 Автообновление новостей Cognify AI

on:
  schedule:
    - cron: '*/10 * * * *'  # Каждые 10 минут
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install
        run: |
          pip install --upgrade pip
          pip install google-genai
      
      - name: 🚀 Generate news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🕐 Запуск по расписанию в $(date)"
          python news_generator.py
      
      - name: 💾 Commit and push
        run: |
          git config user.name "Cognify AI Bot"
          git config user.email "bot@cognify.ai"
          git add news.json news/ sitemap.xml robots.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🤖 Auto-update news [skip ci]"
          git push origin main
