<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Cognify-ui</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 12px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
        }
        
        .link a {
            color: white;
            text-decoration: none;
        }
        
        .error {
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #ff6b6b;
            text-align: center;
        }
        
        .success {
            background: rgba(0,255,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #6bff6b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🧠 Регистрация</h1>
        <div id="message"></div>
        <input type="text" id="username" placeholder="Имя пользователя">
        <input type="password" id="password" placeholder="Пароль (мин. 6 символов)">
        <button onclick="register()">Создать аккаунт</button>
        <div class="link">
            Уже есть аккаунт? <a href="/login.html">Войти</a>
        </div>
    </div>
    
    <script>
        const WORKER_URL = 'https://cognify-backend.твой-аккаунт.workers.dev';
        
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (password.length < 6) {
                showMessage('Пароль должен быть минимум 6 символов', 'error');
                return;
            }
            
            const response = await fetch(`${WORKER_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.error) {
                showMessage(data.error, 'error');
            } else {
                showMessage('Регистрация успешна! Перенаправление...', 'success');
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1500);
            }
        }
        
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.className = type;
            div.innerText = msg;
            div.style.display = 'block';
        }
        
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
