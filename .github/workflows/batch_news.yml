name: Массовая генерация 1000 новостей

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Количество новостей'
        required: true
        default: '100'
        type: choice
        options:
          - '100'
          - '500'
          - '1000'

jobs:
  generate-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов максимум
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install google-genai
      
      - name: Generate batch news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Запускаем генерацию в цикле
          for i in {1..${{ github.event.inputs.count }}}; do
            echo "🔄 Генерация $i/${{ github.event.inputs.count }}"
            python news_generator.py
            sleep 30  # Пауза между генерациями
          done
      
      - name: Commit all news
        run: |
          git config user.name "Batch Generator"
          git config user.email "batch@cognify.ai"
          git add news.json
          git commit -m "📰 Batch generate ${{ github.event.inputs.count }} news" || true
          git push
