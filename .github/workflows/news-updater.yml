name: 🤖 Автообновление новостей Cognify AI

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai
      
      - name: 🚀 Generate news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🔄 Starting news generation at $(date)"
          python news_generator.py
          echo "✅ Generation completed"
      
      - name: 💾 Commit and push changes
        run: |
          git config user.name "Cognify AI Bot"
          git config user.email "bot@cognify.ai"
          
          # Проверяем, изменился ли news.json
          if git diff --quiet news.json; then
            echo "📝 news.json hasn't changed"
            exit 0
          fi
          
          # Показываем изменения для отладки
          git diff --stat news.json
          
          # Добавляем файл
          git add news.json
          
          # Коммитим
          git commit -m "🤖 Update AI news ($(date +'%Y-%m-%d %H:%M')) [skip ci]"
          
          # Пробуем запушить с повторными попытками
          for i in 1 2 3; do
            echo "Attempt $i to push..."
            if git push origin main; then
              echo "✅ Successfully pushed on attempt $i"
              exit 0
            fi
            # Если не получилось, обновляем и пробуем снова
            git pull origin main --rebase
            sleep 5
          done
          
          echo "❌ Failed to push after 3 attempts"
          exit 1
